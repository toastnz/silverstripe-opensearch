---
Name: toast-opensearch
---

Toast\OpenSearch\Forms\SearchForm:
  enable_pagination: true
  results_per_page: 10

Toast\OpenSearch\Helpers\OpenSearch:
  record_operation_fail_silently: true

SilverStripe\ORM\DataObject:
  extensions:
    - Toast\OpenSearch\Extensions\DataObjectExtension

SilverStripe\CMS\Controllers\ContentController:
  extensions:
    - Toast\OpenSearch\Extensions\ContentControllerExtension

SilverStripe\SiteConfig\SiteConfig:
  extensions:
    - Toast\OpenSearch\Extensions\SiteConfigExtension

SilverStripe\SiteConfig\SiteConfigLeftAndMain:
  extensions:
    - Toast\OpenSearch\Extensions\SiteConfigLeftAndMainExtension
